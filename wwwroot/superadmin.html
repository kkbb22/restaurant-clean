<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RestaurantOS | Super Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Tajawal', sans-serif; }
        body { background: #0f0f13; color: #eee; min-height: 100vh; }

        /* LOGIN SCREEN */
        #login-screen {
            position: fixed; inset: 0; background: #0f0f13;
            display: flex; align-items: center; justify-content: center; z-index: 999;
        }
        .login-box {
            background: #1a1a24; border-radius: 24px; padding: 40px;
            width: min(420px, 95vw); border: 1.5px solid rgba(255,255,255,.08);
            box-shadow: 0 20px 60px rgba(0,0,0,.5);
        }
        .login-logo { text-align: center; margin-bottom: 32px; }
        .login-logo h1 { font-size: 2.2rem; font-weight: 900; color: white; letter-spacing: -1px; }
        .login-logo p { color: #888; font-size: .95rem; }
        
        .login-field { margin-bottom: 16px; }
        .login-field label { display: block; font-size: .88rem; font-weight: 700; color: #888; margin-bottom: 7px; }
        .login-field input {
            width: 100%; padding: 13px 16px; border-radius: 12px;
            border: 1.5px solid rgba(255,255,255,.1); background: #0f0f13;
            color: white; outline: none; transition: border-color 0.2s;
        }
        .login-field input:focus { border-color: #6c63ff; }
        
        #login-btn {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #6c63ff, #a855f7);
            border: none; border-radius: 12px; color: white; font-size: 1.1rem; font-weight: 800;
            cursor: pointer; margin-top: 8px; transition: transform 0.2s, opacity 0.2s;
        }
        #login-btn:active { transform: scale(0.98); }

        /* MAIN APP */
        #main-app { display: none; }
        .topbar {
            background: #1a1a24; border-bottom: 1px solid rgba(255,255,255,.07);
            padding: 16px 28px; display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .badge-admin { background: linear-gradient(135deg, #6c63ff, #a855f7); color: white; padding: 4px 12px; border-radius: 50px; font-size: .75rem; font-weight: 700; margin-right: 8px; }

        /* CARDS & TABLES */
        .content { max-width: 1300px; margin: 0 auto; padding: 32px 24px; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
        .stat-box { background: #1a1a24; border-radius: 16px; padding: 20px; border: 1.5px solid rgba(255,255,255,.06); display: flex; align-items: center; gap: 16px; }
        .stat-icon { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
        .si-purple { background: rgba(108,99,255,.2); color: #6c63ff; }
        .si-green { background: rgba(39,174,96,.2); color: #27ae60; }
        .si-red { background: rgba(231,76,60,.2); color: #e74c3c; }
        .si-orange { background: rgba(243,156,18,.2); color: #f39c12; }

        .section-card { background: #1a1a24; border-radius: 16px; border: 1.5px solid rgba(255,255,255,.06); overflow: hidden; margin-bottom: 24px; }
        .section-head { padding: 18px 22px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,.06); }
        
        .dark-table { width: 100%; border-collapse: collapse; }
        .dark-table th { background: rgba(255,255,255,.04); padding: 12px 16px; font-size: .85rem; color: #888; text-align: right; }
        .dark-table td { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,.04); font-size: .9rem; }

        /* FORM */
        .add-form { background: #1a1a24; border-radius: 16px; padding: 28px; border: 1.5px solid #6c63ff; margin-bottom: 24px; display: none; }
        .add-form.show { display: block; animation: slideDown 0.3s ease-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        .field label { display: block; font-size: .85rem; color: #888; margin-bottom: 6px; font-weight: 700; }
        .field input { width: 100%; padding: 11px 14px; border-radius: 10px; border: 1.5px solid rgba(255,255,255,.1); background: #0f0f13; color: white; outline: none; }
        
        #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(100px); padding: 12px 24px; border-radius: 50px; color: white; font-weight: 700; transition: 0.3s; z-index: 9999; opacity: 0; }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .t-success { background: #27ae60; }
        .t-error { background: #e74c3c; }

        .btn-sm-act { border: none; border-radius: 8px; padding: 6px 12px; font-size: .82rem; font-weight: 700; cursor: pointer; transition: 0.2s; margin-left: 4px; }
        .btn-view { background: rgba(108,99,255,.2); color: #6c63ff; }
        .btn-view:hover { background: #6c63ff; color: white; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <div class="login-logo">
            <h1>🍽️ RestaurantOS</h1>
            <p>لوحة تحكم النظام الشاملة</p>
        </div>
        <div class="login-field">
            <label>اسم المستخدم</label>
            <input type="text" id="l-user" placeholder="admin">
        </div>
        <div class="login-field">
            <label>كلمة المرور</label>
            <input type="password" id="l-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <button id="login-btn" onclick="doLogin()">دخول للنظام</button>
        <div id="login-error" style="color:#e74c3c; font-size:.85rem; text-align:center; margin-top:12px; display:none;">❗ البيانات غير صحيحة</div>
    </div>
</div>

<div id="main-app">
    <div class="topbar">
        <div style="display:flex; align-items:center">
            <span style="font-size:1.4rem; font-weight:900; color:white">RestaurantOS</span>
            <span class="badge-admin">SUPER ADMIN</span>
        </div>
        <div>
            <span style="color:#888; margin-left:15px">👤 <span id="sa-username-display">admin</span></span>
            <button class="btn btn-sm btn-outline-danger" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </div>

    <div class="content">
        <div class="stat-grid">
            <div class="stat-box">
                <div class="stat-icon si-purple"><i class="fas fa-store"></i></div>
                <div><div class="stat-num" id="s-total" style="font-size:1.8rem; font-weight:900">0</div><div class="stat-label" style="color:#888">المطاعم</div></div>
            </div>
            <div class="stat-box">
                <div class="stat-icon si-orange"><i class="fas fa-receipt"></i></div>
                <div><div class="stat-num" id="s-orders" style="font-size:1.8rem; font-weight:900">0</div><div class="stat-label" style="color:#888">إجمالي الطلبات</div></div>
            </div>
        </div>

        <div style="margin-bottom:20px">
            <button class="btn btn-primary" style="background:#6c63ff; border:none; font-weight:800; padding:10px 20px" onclick="toggleAddForm()">
                <i class="fas fa-plus ms-2"></i> إضافة مطعم جديد
            </button>
        </div>

        <div class="add-form" id="add-form">
            <h5 style="color:white; font-weight:800; margin-bottom:20px">📝 إنشاء حساب مطعم جديد</h5>
            <div class="form-row">
                <div class="field"><label>اسم المطعم *</label><input type="text" id="a-name" placeholder="مثلاً: شاورما الأمير"></div>
                <div class="field"><label>رقم الهاتف</label><input type="text" id="a-phone" placeholder="07XXXXXXXX"></div>
            </div>
            <div class="form-row">
                <div class="field"><label>اسم المستخدم للنظام *</label><input type="text" id="a-user" placeholder="alameer_admin"></div>
                <div class="field"><label>كلمة المرور *</label><input type="text" id="a-pass" placeholder="••••••••"></div>
            </div>
            <div class="form-row">
                <div class="field"><label>العنوان</label><input type="text" id="a-address" placeholder="عمان، شارع الجامعة"></div>
                <div class="field">
                    <label>اللون الرئيسي</label>
                    <input type="color" id="a-color1" value="#6c63ff" style="height:45px; cursor:pointer">
                </div>
            </div>
            <div style="display:flex; gap:10px">
                <button class="btn btn-success" id="a-submit-btn" onclick="addRestaurant()" style="font-weight:800">✅ تأكيد الإضافة</button>
                <button class="btn btn-secondary" onclick="toggleAddForm()">إلغاء</button>
            </div>
        </div>

        <div class="section-card">
            <div class="section-head">
                <div style="font-weight:800; color:white"><i class="fas fa-list ms-2"></i> إدارة المطاعم</div>
                <button class="btn btn-sm btn-outline-light" onclick="loadRestaurants()"><i class="fas fa-sync"></i> تحديث</button>
            </div>
            <div class="table-responsive">
                <table class="dark-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>المطعم</th>
                            <th>المستخدم</th>
                            <th>الهاتف</th>
                            <th>الحالة</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="restaurants-tbody">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="section-card">
            <div class="section-head">
                <div style="font-weight:800; color:white"><i class="fas fa-clock ms-2"></i> آخر الطلبات عبر كل النظام</div>
            </div>
            <div class="table-responsive">
                <table class="dark-table">
                    <thead>
                        <tr>
                            <th>الطلب</th>
                            <th>المطعم</th>
                            <th>العميل</th>
                            <th>الإجمالي</th>
                            <th>الحالة</th>
                        </tr>
                    </thead>
                    <tbody id="orders-tbody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
const API = 'https://restaurant-production-9092.up.railway.app/api';

// التحقق من الجلسة عند التحميل
window.onload = () => {
    const saved = sessionStorage.getItem('rms_superadmin');
    if (saved) {
        const s = JSON.parse(saved);
        if (s.loggedIn) {
            showApp(s.username);
        }
    }
}

function showApp(user) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    document.getElementById('sa-username-display').textContent = user;
    loadAll();
}

async function doLogin() {
    const user = document.getElementById('l-user').value;
    const pass = document.getElementById('l-pass').value;
    const err = document.getElementById('login-error');
    
    if(!user || !pass) return;

    try {
        const res = await fetch(`${API}/Auth/login`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ Username: user, Password: pass })
        });
        const data = await res.json();
        
        if (data.success && data.role === 'superadmin') {
            sessionStorage.setItem('rms_superadmin', JSON.stringify({ loggedIn: true, username: user }));
            showApp(user);
        } else {
            err.style.display = 'block';
        }
    } catch(e) { alert("خطأ في الاتصال بالسيرفر"); }
}

function doLogout() {
    sessionStorage.removeItem('rms_superadmin');
    location.reload();
}

async function loadAll() {
    await loadRestaurants();
    await loadOrders();
}

async function loadRestaurants() {
    try {
        const res = await fetch(`${API}/Auth/restaurants?adminPassword=admin123`);
        const data = await res.json();
        const tbody = document.getElementById('restaurants-tbody');
        document.getElementById('s-total').textContent = data.length;

        tbody.innerHTML = data.map(r => `
            <tr>
                <td style="color:#6c63ff; font-weight:800">#${r.restaurantId}</td>
                <td style="color:white; font-weight:700">${r.name}</td>
                <td><code style="color:#a855f7">${r.username}</code></td>
                <td>${r.phone || '--'}</td>
                <td><span class="${r.isActive ? 'text-success' : 'text-danger'}">${r.isActive ? '● نشط' : '● موقوف'}</span></td>
                <td>
                    <button class="btn-sm-act btn-view" onclick="window.open('dashboard.html?RestaurantId=${r.restaurantId}', '_blank')">فتح</button>
                    <button class="btn-sm-act" style="background:rgba(255,255,255,0.1); color:white" onclick="toggleRestaurant(${r.restaurantId})">تبديل الحالة</button>
                </td>
            </tr>
        `).join('');
    } catch(e) { console.error(e); }
}

async function loadOrders() {
    try {
        const res = await fetch(`${API}/Orders`);
        const data = await res.json();
        document.getElementById('s-orders').textContent = data.length;
        
        const tbody = document.getElementById('orders-tbody');
        tbody.innerHTML = data.slice(0, 10).map(o => `
            <tr>
                <td style="font-weight:800">#${o.orderId}</td>
                <td><span class="badge bg-dark">${o.restaurantId}</span></td>
                <td>${o.customerName || 'زبون'}</td>
                <td style="color:#27ae60; font-weight:700">${o.totalAmount} د.أ</td>
                <td>${o.status}</td>
            </tr>
        `).join('');
    } catch(e) { console.error(e); }
}

async function addRestaurant() {
    const name = document.getElementById('a-name').value;
    const user = document.getElementById('a-user').value;
    const pass = document.getElementById('a-pass').value;
    
    if(!name || !user || !pass) { toast("يرجى ملء الحقول الإجبارية", "e"); return; }

    const btn = document.getElementById('a-submit-btn');
    btn.disabled = true;

    try {
        const res = await fetch(`${API}/Auth/add-restaurant`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                name: name,
                Username: user,
                Password: pass,
                phone: document.getElementById('a-phone').value,
                address: document.getElementById('a-address').value,
                primaryColor: document.getElementById('a-color1').value,
                adminPassword: 'admin123'
            })
        });

        if(res.ok) {
            toast("✅ تم إضافة المطعم بنجاح", "s");
            toggleAddForm();
            loadRestaurants();
        } else {
            toast("❌ حدث خطأ، ربما اسم المستخدم موجود مسبقاً", "e");
        }
    } catch(e) { toast("خطأ في الاتصال", "e"); }
    btn.disabled = false;
}

async function toggleRestaurant(id) {
    await fetch(`${API}/Auth/toggle/${id}?adminPassword=admin123`, { method: 'PUT' });
    loadRestaurants();
}

function toggleAddForm() {
    const f = document.getElementById('add-form');
    f.classList.toggle('show');
}

function toast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type === 's' ? 't-success' : 't-error'}`;
    setTimeout(() => t.className = '', 3000);
}
</script>
</body>
</html>
