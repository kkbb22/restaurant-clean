<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - مطعمي</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* ستايلاتك الجميلة كما هي */
        * { font-family: 'Tajawal', sans-serif; }
        body { background: #f0f2f5; min-height: 100vh; }
        .sidebar { position: fixed; top: 0; right: 0; width: 260px; height: 100vh; background: linear-gradient(180deg, #2c3e50 0%, #1a252f 100%); z-index: 100; display: flex; flex-direction: column; box-shadow: -4px 0 20px rgba(0,0,0,.2); }
        .main-content { margin-right: 260px; min-height: 100vh; }
        .page { display: none; }
        .page.active { display: block; }
        /* أضفنا هذا التنسيق الصغير لكروت الطلبات */
        .order-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; border-right: 5px solid #3498db; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <div class="login-logo">
            <h1>🍽️ مطعمي</h1>
            <p>لوحة تحكم المطعم</p>
        </div>
        <div class="login-field">
            <label>اسم المستخدم</label>
            <input type="text" id="l-user" placeholder="اسم المستخدم">
        </div>
        <div class="login-field">
            <label>كلمة المرور</label>
            <input type="password" id="l-pass" placeholder="••••••••">
        </div>
        <button id="do-login-btn" onclick="doLogin()">دخول ←</button>
    </div>
</div>

<div id="main-dashboard" style="display:none;">
    <div class="sidebar">
        <div class="sidebar-brand"><h2>مطعمي</h2></div>
        <nav class="nav-menu">
            <a class="nav-item active" onclick="showPage('overview')"><i class="fas fa-chart-pie"></i> نظرة عامة</a>
            <a class="nav-item" onclick="showPage('orders')"><i class="fas fa-receipt"></i> الطلبات</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h4 id="page-title">نظرة عامة</h4>
            <button class="btn btn-primary" onclick="refreshAll()">تحديث</button>
        </div>
        <div class="page-content">
            <div id="page-overview" class="page active">
                <div id="ordersContainer"></div>
            </div>
            <div id="page-orders" class="page">
                </div>
        </div>
    </div>
</div>

<script>
    // --- الإعدادات والروابط ---
    const API = '/api'; // الرابط النسبي يعمل أفضل مع الـ Proxy

    // دالة تسجيل الدخول المعدلة لتخزين الـ ID
    async function doLogin() {
        const u = document.getElementById('l-user').value;
        const p = document.getElementById('l-pass').value;
        
        try {
            const res = await fetch(`${API}/Auth/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: u, password: p })
            });
            
            if (res.ok) {
                const data = await res.json();
                // حفظ بيانات الجلسة
                sessionStorage.setItem('rms_session', JSON.stringify(data));
                showDashboard();
            } else {
                alert("بيانات الدخول غير صحيحة");
            }
        } catch(e) { console.error(e); }
    }

    function showDashboard() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-dashboard').style.display = 'block';
        refreshAll();
    }

    // دالة جلب البيانات "الذهبية" المفلترة
    async function refreshAll() {
        const session = JSON.parse(sessionStorage.getItem('rms_session'));
        if (!session) return;

        const resId = session.restaurantId;

        try {
            // لاحظ تمرير الـ restaurantId في الرابط
            const response = await fetch(`${API}/Orders?restaurantId=${resId}`);
            const orders = await response.json();

            const container = document.getElementById('ordersContainer');
            container.innerHTML = orders.map(o => `
                <div class="order-card">
                    <h5>طلب #${o.orderId} - ${o.status}</h5>
                    <p>العميل: ${o.customerName}</p>
                    <p>المبلغ: ${o.totalAmount} JOD</p>
                    <ul>${o.items.map(i => `<li>${i.menuName} x ${i.quantity}</li>`).join('')}</ul>
                </div>
            `).join('');
        } catch(e) { console.error("خطأ في التحديث:", e); }
    }

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
    }

    // فحص الجلسة عند التحميل
    window.onload = () => {
        if(sessionStorage.getItem('rms_session')) showDashboard();
    };
</script>
</body>
</html>
